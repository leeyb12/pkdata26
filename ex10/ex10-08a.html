<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수표현식으로 게임</title>
  </head>
  <body>
    영웅의 이름을 입력하세요 <input type="text" id="heroName" /> <br />
    영웅의 레벨을 입력하세요 <input type="text" id="heroLevel" /> <br />
    영웅의 스킬을 입력하세요
    <input type="text" id="heroSkill" placeholder="fire / ice / slow" /><br />
    <button id="btn">실행</button>
    <hr />
    <div id="result"></div>

    <script>
      const print = function (msg) {
        document.getElementById("result").innerHTML += msg + "<br>";
      };

      const lol = function (heroName, level = 1, cb) {
        print("==========================");
        print(`${heroName}님이 ${level}레벨이 되었습니다.`);
        print("==========================");

        if (level >= 6) {
          print(`${heroName}님이 궁극기를 씁니다.`);
          cb(level);
        } else {
          print(`${heroName}님이 깨작 평타를 때립니다.`);
        }
      };

      const fire = function (ff) {
        for (let i = 1; i < ff + 1; i++) {
          print(`${ff}레벨 이어서 ${i}개 메테오를 던집니다.`);
        }
      };

      const ice = function (ii) {
        for (let i = 1; i < ii; i++) {
          print(`${ii}레벨 이어서 ${i * 2}개 얼음을 던집니다.`);
        }
      };

      const slow = function (ss) {
        for (let i = ss; 0 < i; i--) {
          print(`${ss}레벨 이어서 다리를 공격하여 이동속도를 ${i}% 줄입니다.`);
        }
      };

      const skills = { fire, ice, slow };

      document.getElementById("btn").addEventListener("click", function () {
        document.getElementById("result").innerHTML = "";

        const heroName = document.getElementById("heroName").value;
        const heroLevel = parseInt(document.getElementById("heroLevel").value);
        const heroSkill = document.getElementById("heroSkill").value;

        lol(heroName, heroLevel, skills[heroSkill]);
      });
    </script>
  </body>
</html>
