<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구조적가상클래스</title>
    <style>
      div:first-of-type {
        border: 1px solid crimson;
      }
      p:first-child {
        background-color: cadetblue;
      }
      p:last-child {
        background-color: rgb(160, 227, 253);
      }
      p:last-of-type {
        color: red;
      }
      div:last-child {
        border: 1px solid blue;
      }
    </style>
  </head>
  <body>
    <h1>구조적가상클래스</h1>  
    <hr />
    <!-- div>(p*5+span*2)*2 -->
    <div>
      <p>first 입니다.</p>
      <span>테스트입니다.</span>
      <p>first가 아닙니다.</p>
      <p>first가 아닙니다.</p>
      <p>first가 아닙니다.</p>
      <p>last입니다.</p>
      <span>테스트입니다.</span>
    </div>
    <hr />
    <div>
      <p>first 입니다.</p>
      <p>first가 아닙니다.</p>
      <p>first가 아닙니다.</p>
      <p>first가 아닙니다.</p>
      <p>last입니다.</p>
    </div>
  </body>
</html>
