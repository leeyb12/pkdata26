<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점수 등급</title>
  </head>
  <body>
    <script>
      const score = Number(prompt("점수를 입력해주세요.", 1409));

      if (score == 100) {
        console.log("A++입니다.");
        alert("A++입니다.");
        document.write(`<h2>${score}점은 A++입니다.</h2>`);
      } else if (score >= 90 && score < 100) {
        console.log("A입니다.");
        alert("A입니다.");
        document.write(`<h2>${score}점은 A입니다.</h2>`);
      } else if (score >= 80 && score < 90) {
        console.log("B입니다.");
        alert("B입니다.");
        document.write(`<h2>${score}점은 B입니다.</h2>`);
      } else if (score >= 70 && score < 80) {
        console.log("C입니다.");
        alert("C입니다.");
        document.write(`<h2>${score}점은 C입니다.</h2>`);
      } else if (score >= 60 && score < 70) {
        console.log("D입니다.");
        alert("D입니다.");
        document.write(`<h2>${score}점은 D입니다.</h2>`);
      } else {
        console.log("F입니다.");
        alert("F입니다.");
        document.write(`<h2>${score}점은 F입니다.</h2>`);
      }
    </script>
  </body>
</html>
