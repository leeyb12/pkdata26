<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주사위 시뮬레이터</title>
  <style>
    h2 {
        text-align: center;
      }
      #box {
        background-color: rgb(235, 216, 191);
        width: 400px;
        height: 300px;
        margin: 10% auto;
        padding: 40px 10px 40px 30px; 
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.562);
        border-radius: 2dvb;
      }
      #box > div {
        height: 30px;
        margin: 5px;
        background-color: rgb(42, 154, 206);
        box-shadow: 10px 10px 20px rgba(58, 43, 126, 0.562);
        border-radius: 0 20px 20px 0;
      }

      table {
        width: 400px;
        margin: auto;
      }
      tr,
      th,
      td {
        background-color: rgb(14, 104, 107);
        color: white;
        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.5);
        padding: 10px;
        text-align: center;
        font-weight: bold;
      }
      th {
        background-color: rgb(99, 36, 36);
      }
      td:last-of-type {
        background-color: rgb(34, 42, 156);
      }
      span {
        position: absolute;
        color: white;
        font-weight: bold;
        display: block;
        text-align: right;
        line-height: 1.7rem;
        margin: 0 5px;
      }
      .btn {
        width: 400px;
        margin: 20px auto;
        text-align: right;
      }
      .btn button {
        padding: 10px;
        margin: 0 20px;
      }
  </style>
</head>
<body>

<h1>🎲 주사위 시뮬레이터</h1>

<div class="btn">
  <button onclick="location.reload(true)">새로고침</button>
</div>
<div id="result"></div>
<script>
  function runSimulation() {
    let i = 0;
    let dice = 0;

    const diceCount = [0, 0, 0, 0, 0, 0];
    const gameEnd = 100000;

    while (i < gameEnd) {
      const array = new Uint8Array(1);
      crypto.getRandomValues(array);

      dice = (array[0] % 6) + 1;
      diceCount[dice - 1]++;
      i++;
    }

    const sum = diceCount.reduce((a, b) => a + b, 0);
    const verf = (sum === gameEnd) ? "검증완료" : "검증이상";

    const percent = diceCount.map(v =>
      ((v / gameEnd) * 100).toFixed(2)
    );

    // 그래프
    let graph = `<div id="box">`;
    for (let i = 0; i < 6; i++) {
      graph += `
        <div style="width:${percent[i]}%">
          <span>${i + 1}️⃣ (${percent[i]}%)</span>
        </div>
      `;
    }
    graph += `</div>`;

    // 표
    let table = `<h2>${gameEnd}회 (${verf})</h2>`;
    table += `<table>
      <tr>
        <th>주사위</th>
        <th>횟수</th>
        <th>확률(%)</th>
      </tr>`;

    for (let i = 0; i < 6; i++) {
      table += `
        <tr>
          <td>${i + 1}</td>
          <td>${diceCount[i]}</td>
          <td>${percent[i]}</td>
        </tr>
      `;
    }

    table += `</table>`;

    // ✅ 위치 변경 (표 → 그래프 순서)
    document.getElementById("result").innerHTML = table + graph;
  }

  runSimulation();
</script>

</body>
</html>
